<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voz do Abraço UESC</title>
<!-- EmailJS: envia notificação automática por email quando um novo cadastro pendente é criado -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #DDD5CF; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; background: #DDD5CF; padding: 2rem;
  }
  .logo-row {
    display: flex; align-items: center; justify-content: center;
    gap: 2rem; margin-bottom: 1.5rem;
  }
  .logo-row img { height: 100px; object-fit: contain; }
  .welcome-text { font-size: 1.1rem; color: #444; margin-bottom: 1.5rem; text-align: center; }
  .login-box {
    background: rgba(255,255,255,0.55); border: 0.5px solid #c9c2bc;
    border-radius: 12px; padding: 1.75rem 2rem; width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .login-box label { font-size: 13px; color: #666; margin-bottom: 2px; display: block; }
  .login-box input {
    width: 100%; padding: 9px 11px; border: 0.5px solid #c9c2bc;
    border-radius: 8px; background: #f9f7f5; font-size: 14px; color: #333;
  }
  .campo-senha-wrap { position: relative; }
  .campo-senha-wrap input { padding-right: 38px; }
  .btn-olho {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 26px; height: 26px; border: none; background: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #888; padding: 0;
  }
  .btn-olho:hover { color: #555; }
  .btn-olho svg { width: 19px; height: 19px; }
  .senha-obs {
    font-size: 11.5px; color: #888; line-height: 1.4; margin-top: -2px;
  }
  .login-btn {
    padding: 10px; border: 0.5px solid #b0a9a3; border-radius: 8px;
    background: #c9c2bc; color: #444; font-size: 14px; cursor: pointer; margin-top: 4px;
  }
  .login-btn:hover { background: #bfb8b2; }
  .login-btn:disabled { opacity: 0.6; cursor: default; }
  .login-error { color: #a33; font-size: 13px; text-align: center; display: none; }
  .login-info { color: #5a7a66; font-size: 13px; text-align: center; display: none; line-height: 1.4; }
  .login-loading { color: #777; font-size: 13px; text-align: center; display: none; }
  .toggle-modo {
    text-align: center; font-size: 13px; color: #777; margin-top: 2px;
  }
  .toggle-modo button {
    background: none; border: none; color: #6b7d72; font-size: 13px;
    text-decoration: underline; cursor: pointer; padding: 0;
  }
  .toggle-modo button:hover { color: #4d5b51; }

  /* MAIN */
  #main-screen { display: none; flex-direction: column; min-height: 100vh; background: #DDD5CF; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: #cec7c1; border-bottom: 0.5px solid #b5aeaa;
    position: sticky; top: 0; z-index: 10;
  }
  .pessoas-badge {
    font-size: 13px; color: #555; background: #ddd5cf;
    border: 0.5px solid #b5aeaa; border-radius: 8px; padding: 5px 14px;
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .topbar-right img { height: 38px; object-fit: contain; }
  .logout-btn {
    font-size: 12px; color: #777; background: none;
    border: 0.5px solid #b5aeaa; border-radius: 6px; padding: 5px 12px; cursor: pointer;
  }
  .logout-btn:hover { background: #c9c2bc; }

  .content { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  /* BLOCOS */
  .bloco {
    background: rgba(255,255,255,0.5); border: 0.5px solid #c0b9b3;
    border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
  }
  .bloco-grid {
    display: grid;
    grid-template-columns: 1.2fr 0.5fr 1fr 1fr 1.5fr 2.5fr;
    gap: 10px; align-items: start;
  }
  .bloco-col { display: flex; flex-direction: column; gap: 4px; }
  .bloco-col label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .bloco-col input {
    width: 100%; padding: 7px 9px; border: 0.5px solid #c0b9b3;
    border-radius: 6px; background: #f5f2ef; font-size: 13px; color: #333;
    font-family: inherit;
  }
  .bloco-col textarea {
    width: 100%; padding: 7px 9px; border: 0.5px solid #c0b9b3;
    border-radius: 6px; background: #f5f2ef; font-size: 13px; color: #333;
    font-family: inherit; resize: none; overflow: hidden; min-height: 36px; line-height: 1.5;
  }
  .bloco-divider { border: none; border-top: 0.5px solid #c0b9b3; margin: 4px 0; }
  .bloco-grid-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
  .bloco-grid-simNao { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-items: start; margin-top: 4px; }
  .simNao-col { display: flex; flex-direction: column; gap: 6px; }
  .simNao-col > span { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .simNao-options { display: flex; gap: 10px; }
  .simNao-options label { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #555; cursor: pointer; font-weight: normal; text-transform: none; letter-spacing: 0; }
  .simNao-options input[type="radio"] { accent-color: #9a9390; cursor: pointer; width: 14px; height: 14px; }
  .bloco-actions { display: flex; justify-content: flex-end; }
  .btn-remover {
    font-size: 12px; color: #888; background: none;
    border: 0.5px solid #b5aeaa; border-radius: 6px; padding: 5px 12px; cursor: pointer;
  }
  .btn-remover:hover { background: #d0c9c3; color: #555; }

  .add-row { padding: 4px 20px 24px; }
  .btn-add {
    font-size: 13px; color: #555; background: #cec7c1;
    border: 0.5px solid #b5aeaa; border-radius: 8px; padding: 9px 20px; cursor: pointer;
  }
  .btn-add:hover { background: #c1bab4; }

  .sync-status {
    font-size: 11px; color: #999; text-align: right;
    padding: 0 20px 8px; font-style: italic;
  }

  @media (max-width: 900px) {
    .bloco-grid { grid-template-columns: 1.2fr 0.5fr 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .bloco-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 400px) {
    .bloco-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TELA DE LOGIN / CADASTRO -->
<div id="login-screen">
  <div class="logo-row">
    <img src="brasao-uesc.png" alt="Brasão UESC" onerror="this.style.display='none'">
    <img src="logo-voz.png" alt="Voz do Abraço UESC" onerror="this.style.display='none'">
  </div>
  <p class="welcome-text">Olá, seja bem-vindo ao site Voz do Abraço UESC</p>
  <div class="login-box">

    <div id="campo-nome">
      <label>Nome completo</label>
      <input type="text" id="inp-nome" placeholder="Seu nome completo" autocomplete="name">
    </div>

    <div>
      <label>Gmail</label>
      <input type="email" id="inp-email" placeholder="usuario@gmail.com" autocomplete="username">
    </div>

    <div>
      <label>Senha</label>
      <div class="campo-senha-wrap">
        <input type="password" id="inp-senha" placeholder="Insira a senha" autocomplete="current-password">
        <button type="button" class="btn-olho" id="btn-olho" aria-label="Mostrar senha" onclick="alternarSenha()">
          <svg id="icone-olho" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
      <p class="senha-obs" id="obs-senha-cadastro">OBS: A senha é uma senha nova, criada aqui, sem nenhuma relação com a senha do Gmail.</p>
    </div>

    <p class="login-error" id="login-error"></p>
    <p class="login-info" id="login-info"></p>
    <p class="login-loading" id="login-loading">Carregando...</p>

    <button class="login-btn" id="btn-acao" onclick="tentarAcao()">Criar conta</button>

    <p class="toggle-modo" id="toggle-modo">
      Já tem uma conta aprovada? <button type="button" onclick="alternarModo()">Entrar</button>
    </p>
  </div>
</div>

<!-- TELA PRINCIPAL -->
<div id="main-screen">
  <div class="topbar">
    <div class="pessoas-badge">Pessoas atendidas: <strong id="contador">0</strong></div>
    <div class="topbar-right">
      <img src="brasao-uesc.png" alt="Brasão UESC" onerror="this.style.display='none'">
      <img src="logo-voz.png" alt="Voz do Abraço UESC" onerror="this.style.display='none'">
      <button class="logout-btn" onclick="sair()">Sair</button>
    </div>
  </div>
  <div class="sync-status" id="sync-status">Sincronizando...</div>
  <div class="content" id="blocos-container"></div>
  <div class="add-row">
    <button class="btn-add" onclick="adicionarBloco()">+ Adicionar mais</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
    getFirestore, collection, doc, getDocs, setDoc, getDoc, deleteDoc, onSnapshot, query, orderBy
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, signOut, updateProfile
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBkYGQ-_R3gWNveNyI-1wQopVGKs1mQxco",
    authDomain: "aconselha-onco-uesc.firebaseapp.com",
    projectId: "aconselha-onco-uesc",
    storageBucket: "aconselha-onco-uesc.firebasestorage.app",
    messagingSenderId: "802283445243",
    appId: "1:802283445243:web:709fc1f2f2e5820cfa495e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const COLECAO = "blocos";
  const COLECAO_USUARIOS = "usuarios";

  // ── EMAILJS: notificação automática de novo cadastro pendente ──
  const EMAILJS_PUBLIC_KEY = "hqEtMfxGCZ_b-9XaP";
  const EMAILJS_SERVICE_ID = "service_o7ya0tg";
  const EMAILJS_TEMPLATE_ID = "template_sbd5c6b";
  if (window.emailjs) {
    window.emailjs.init(EMAILJS_PUBLIC_KEY);
  }

  async function notificarNovoCadastro(nome, email) {
    if (!window.emailjs) {
      console.error("EmailJS não carregou — verifique a conexão ou se o script foi bloqueado.");
      return;
    }
    try {
      await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { nome, email });
    } catch (e) {
      // Falha no envio do email não deve impedir o cadastro do usuário,
      // então só registramos no console em vez de mostrar erro pra pessoa.
      console.error("Falha ao enviar email de notificação:", e);
    }
  }

  let modoCadastro = true; // tela abre em modo "Criar conta" por padrão

  let unsubscribe = null;
  let salvandoLocal = false; // flag para evitar loop ao receber do Firestore

  // ── UTILITÁRIOS ────────────────────────────────────────────────
  function esc(s) {
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  }

  function mascararTelefone(el) {
    let v = el.value.replace(/\D/g, "");
    if (v.length === 0) { el.value = ""; return; }
    if (v.length <= 2) { el.value = "(" + v; return; }
    if (v.length <= 6) { el.value = "(" + v.slice(0,2) + ") " + v.slice(2); return; }
    if (v.length <= 10) { el.value = "(" + v.slice(0,2) + ") " + v.slice(2,6) + "-" + v.slice(6); return; }
    el.value = "(" + v.slice(0,2) + ") " + v.slice(2,7) + "-" + v.slice(7,11);
  }

  window.mascararTelefone = mascararTelefone;

  function setSyncStatus(msg) {
    document.getElementById("sync-status").textContent = msg;
  }

  // ── LOGIN / CADASTRO ──────────────────────────────────────────
  function mostrarErro(msg) {
    const err = document.getElementById("login-error");
    const info = document.getElementById("login-info");
    info.style.display = "none";
    err.textContent = msg;
    err.style.display = "block";
  }

  function mostrarInfo(msg) {
    const err = document.getElementById("login-error");
    const info = document.getElementById("login-info");
    err.style.display = "none";
    info.textContent = msg;
    info.style.display = "block";
  }

  function limparMensagens() {
    document.getElementById("login-error").style.display = "none";
    document.getElementById("login-info").style.display = "none";
  }

  function setCarregando(ligado) {
    document.getElementById("login-loading").style.display = ligado ? "block" : "none";
    document.getElementById("btn-acao").disabled = ligado;
  }

  window.alternarSenha = function() {
    const inp = document.getElementById("inp-senha");
    const icone = document.getElementById("icone-olho");
    const mostrando = inp.type === "text";
    inp.type = mostrando ? "password" : "text";
    // olho aberto = mostrando a senha; olho fechado (com risco) = senha oculta
    icone.innerHTML = mostrando
      ? '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"></path><circle cx="12" cy="12" r="3"></circle>'
      : '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 4.22-5.06"></path><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19"></path><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
  };

  window.alternarModo = function() {
    modoCadastro = !modoCadastro;
    limparMensagens();
    document.getElementById("campo-nome").style.display = modoCadastro ? "block" : "none";
    document.getElementById("obs-senha-cadastro").style.display = modoCadastro ? "block" : "none";
    document.getElementById("btn-acao").textContent = modoCadastro ? "Criar conta" : "Entrar";
    document.getElementById("toggle-modo").innerHTML = modoCadastro
      ? 'Já tem uma conta aprovada? <button type="button" onclick="alternarModo()">Entrar</button>'
      : 'Ainda não tem conta? <button type="button" onclick="alternarModo()">Criar conta</button>';
  };

  window.tentarAcao = function() {
    if (modoCadastro) criarConta(); else fazerLogin();
  };

  async function criarConta() {
    const nome = document.getElementById("inp-nome").value.trim();
    const email = document.getElementById("inp-email").value.trim();
    const senha = document.getElementById("inp-senha").value;
    limparMensagens();

    if (!nome) return mostrarErro("Informe seu nome completo.");
    if (!email) return mostrarErro("Informe seu Gmail.");
    if (senha.length < 6) return mostrarErro("A senha precisa ter pelo menos 6 caracteres.");

    setCarregando(true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, senha);
      await updateProfile(cred.user, { displayName: nome });
      await setDoc(doc(db, COLECAO_USUARIOS, cred.user.uid), {
        nome, email, status: "pendente", criadoEm: new Date().toISOString()
      });
      notificarNovoCadastro(nome, email); // dispara o email em segundo plano, sem bloquear o fluxo
      await signOut(auth);
      setCarregando(false);
      mostrarInfo("Conta criada! Aguarde a aprovação do administrador para conseguir entrar. Você será avisado(a) quando o acesso for liberado.");
      document.getElementById("inp-senha").value = "";
    } catch (e) {
      setCarregando(false);
      if (e.code === "auth/email-already-in-use") {
        mostrarErro("Este Gmail já está cadastrado. Tente entrar em vez de criar uma nova conta.");
      } else if (e.code === "auth/invalid-email") {
        mostrarErro("Gmail inválido.");
      } else {
        mostrarErro("Não foi possível criar a conta. Tente novamente.");
        console.error(e);
      }
    }
  }

  async function fazerLogin() {
    const email = document.getElementById("inp-email").value.trim();
    const senha = document.getElementById("inp-senha").value;
    limparMensagens();
    if (!email || !senha) return mostrarErro("Preencha o Gmail e a senha.");

    setCarregando(true);
    try {
      const cred = await signInWithEmailAndPassword(auth, email, senha);
      const snap = await getDoc(doc(db, COLECAO_USUARIOS, cred.user.uid));
      const status = snap.exists() ? snap.data().status : "pendente";

      if (status !== "aprovado") {
        await signOut(auth);
        setCarregando(false);
        mostrarInfo("Seu acesso ainda não foi aprovado pelo administrador. Tente novamente mais tarde.");
        return;
      }

      setCarregando(false);
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("main-screen").style.display = "flex";
      iniciarEscuta();
    } catch (e) {
      setCarregando(false);
      if (e.code === "auth/invalid-credential" || e.code === "auth/wrong-password" || e.code === "auth/user-not-found") {
        mostrarErro("Gmail ou senha incorretos.");
      } else {
        mostrarErro("Não foi possível entrar. Tente novamente.");
        console.error(e);
      }
    }
  }

  window.sair = function() {
    if (unsubscribe) unsubscribe();
    signOut(auth);
    document.getElementById("main-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("inp-senha").value = "";
    document.getElementById("blocos-container").innerHTML = "";
    limparMensagens();
  };

  document.getElementById("inp-senha").addEventListener("keydown", e => {
    if (e.key === "Enter") window.tentarAcao();
  });

  // ── FIRESTORE: ESCUTA EM TEMPO REAL ───────────────────────────
  function iniciarEscuta() {
    setSyncStatus("Conectando...");
    const q = query(collection(db, COLECAO), orderBy("ordem"));
    unsubscribe = onSnapshot(q, (snapshot) => {
      if (salvandoLocal) return; // evita rerender durante digitação
      const container = document.getElementById("blocos-container");
      container.innerHTML = "";
      const docs = [];
      snapshot.forEach(d => docs.push({ id: d.id, ...d.data() }));
      if (docs.length === 0) {
        adicionarBlocoComDados({ id: gerarId(), nome:"", telefone:"", data:"", obs:"", ordem: 0 }, false);
      } else {
        docs.forEach(d => adicionarBlocoComDados(d, false));
      }
      atualizarContador();
      document.querySelectorAll("textarea").forEach(autoResize);
      setSyncStatus("✓ Sincronizado");
    }, (err) => {
      setSyncStatus("Erro de conexão — verifique a internet");
      console.error(err);
    });
  }

  // ── FIRESTORE: SALVAR ──────────────────────────────────────────
  let saveTimer = null;
  function agendarSalvamento() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(salvarTodos, 1000);
  }

  async function salvarTodos() {
    salvandoLocal = true;
    setSyncStatus("Salvando...");
    const cards = document.querySelectorAll("#blocos-container .bloco");
    let ordem = 0;
    for (const card of cards) {
      const id = card.dataset.id;
      const tas = card.querySelectorAll("textarea");
      const inp = card.querySelector("input[data-campo='telefone']");
      const inpIdade = card.querySelector("input[data-campo='idade']");
      const inpData = card.querySelector("input[data-campo='data']");
      const getRadio = (nome) => { const r = card.querySelector(`input[name="${id}-${nome}"]:checked`); return r ? r.value : ""; };
      await setDoc(doc(db, COLECAO, id), {
        nome: tas[0]?.value || "",
        idade: inpIdade?.value || "",
        telefone: inp?.value || "",
        data: inpData?.value || "",
        tratamento: tas[1]?.value || "",
        comorbidade: tas[2]?.value || "",
        medicacao: tas[3]?.value || "",
        obs: tas[4]?.value || "",
        radioterapia: getRadio("radioterapia"),
        curativo: getRadio("curativo"),
        sondaNaso: getRadio("sondaNaso"),
        sondaEnteral: getRadio("sondaEnteral"),
        traqueostomia: getRadio("traqueostomia"),
        ordem: ordem++
      });
    }
    // remover docs que não existem mais na tela
    const snapshot = await getDocs(collection(db, COLECAO));
    const idsNaTela = [...cards].map(c => c.dataset.id);
    for (const d of snapshot.docs) {
      if (!idsNaTela.includes(d.id)) await deleteDoc(doc(db, COLECAO, d.id));
    }
    setSyncStatus("✓ Salvo");
    salvandoLocal = false;
  }

  // ── BLOCOS ─────────────────────────────────────────────────────
  function gerarId() {
    return "b" + Date.now() + Math.random().toString(36).slice(2,6);
  }

  window.adicionarBloco = function() {
    const container = document.getElementById("blocos-container");
    const ordem = container.querySelectorAll(".bloco").length;
    const d = { id: gerarId(), nome:"", telefone:"", data:"", obs:"", ordem };
    adicionarBlocoComDados(d, true);
    agendarSalvamento();
  };

  function adicionarBlocoComDados(d, focarNome = false) {
    const container = document.getElementById("blocos-container");
    const div = document.createElement("div");
    div.className = "bloco";
    div.dataset.id = d.id;
    div.innerHTML = `
      <div class="bloco-grid">
        <div class="bloco-col">
          <label>Nome</label>
          <textarea data-campo="nome" placeholder="Nome completo" oninput="autoResizeExt(this);agendarSalv()">${esc(d.nome)}</textarea>
        </div>
        <div class="bloco-col">
          <label>Idade (em anos)</label>
          <input type="number" data-campo="idade" placeholder="Ex: 45" min="0" max="120" value="${esc(d.idade||'')}" oninput="agendarSalv()">
        </div>
        <div class="bloco-col">
          <label>Telefone</label>
          <input type="tel" data-campo="telefone" placeholder="(00) 00000-0000" value="${esc(d.telefone)}" oninput="mascararTelefone(this);agendarSalv()">
        </div>
        <div class="bloco-col">
          <label>Data</label>
          <input type="text" data-campo="data" placeholder="Ex: 10/06 – retorno" value="${esc(d.data)}" oninput="agendarSalv()">
        </div>
        <div class="bloco-col">
          <label>Tratamento atual</label>
          <textarea data-campo="tratamento" placeholder="Protocolo de tratamento..." oninput="autoResizeExt(this);agendarSalv()">${esc(d.tratamento||'')}</textarea>
        </div>
        <div class="bloco-col">
          <label>Observações</label>
          <textarea data-campo="obs" placeholder="Anotações do atendimento..." oninput="autoResizeExt(this);agendarSalv()">${esc(d.obs)}</textarea>
        </div>
      </div>
      <hr class="bloco-divider">
      <div class="bloco-grid-bottom">
        <div class="bloco-col">
          <label>Co-morbidade</label>
          <textarea data-campo="comorbidade" placeholder="Co-morbidades do paciente..." oninput="autoResizeExt(this);agendarSalv()">${esc(d.comorbidade||'')}</textarea>
        </div>
        <div class="bloco-col">
          <label>Medicação de Uso Contínuo</label>
          <textarea data-campo="medicacao" placeholder="Medicações em uso contínuo..." oninput="autoResizeExt(this);agendarSalv()">${esc(d.medicacao||'')}</textarea>
        </div>
      </div>
      <div class="bloco-grid-simNao">
        <div class="simNao-col">
          <span>Radioterapia</span>
          <div class="simNao-options">
            <label><input type="radio" name="${d.id}-radioterapia" value="Sim" ${d.radioterapia==='Sim'?'checked':''} onchange="agendarSalv()"> Sim</label>
            <label><input type="radio" name="${d.id}-radioterapia" value="Não" ${d.radioterapia==='Não'?'checked':''} onchange="agendarSalv()"> Não</label>
          </div>
        </div>
        <div class="simNao-col">
          <span>Curativo</span>
          <div class="simNao-options">
            <label><input type="radio" name="${d.id}-curativo" value="Sim" ${d.curativo==='Sim'?'checked':''} onchange="agendarSalv()"> Sim</label>
            <label><input type="radio" name="${d.id}-curativo" value="Não" ${d.curativo==='Não'?'checked':''} onchange="agendarSalv()"> Não</label>
          </div>
        </div>
        <div class="simNao-col">
          <span>Sonda Nasogástrica</span>
          <div class="simNao-options">
            <label><input type="radio" name="${d.id}-sondaNaso" value="Sim" ${d.sondaNaso==='Sim'?'checked':''} onchange="agendarSalv()"> Sim</label>
            <label><input type="radio" name="${d.id}-sondaNaso" value="Não" ${d.sondaNaso==='Não'?'checked':''} onchange="agendarSalv()"> Não</label>
          </div>
        </div>
        <div class="simNao-col">
          <span>Sonda Enteral</span>
          <div class="simNao-options">
            <label><input type="radio" name="${d.id}-sondaEnteral" value="Sim" ${d.sondaEnteral==='Sim'?'checked':''} onchange="agendarSalv()"> Sim</label>
            <label><input type="radio" name="${d.id}-sondaEnteral" value="Não" ${d.sondaEnteral==='Não'?'checked':''} onchange="agendarSalv()"> Não</label>
          </div>
        </div>
        <div class="simNao-col">
          <span>Traqueostomia</span>
          <div class="simNao-options">
            <label><input type="radio" name="${d.id}-traqueostomia" value="Sim" ${d.traqueostomia==='Sim'?'checked':''} onchange="agendarSalv()"> Sim</label>
            <label><input type="radio" name="${d.id}-traqueostomia" value="Não" ${d.traqueostomia==='Não'?'checked':''} onchange="agendarSalv()"> Não</label>
          </div>
        </div>
      </div>
      <div class="bloco-actions">
        <button class="btn-remover" onclick="removerBloco(this)">Remover este bloco</button>
      </div>`;
    container.appendChild(div);
    atualizarContador();
    if (focarNome) div.querySelector("textarea").focus();
  }

  window.removerBloco = function(btn) {
    const container = document.getElementById("blocos-container");
    if (container.querySelectorAll(".bloco").length <= 1) return;
    btn.closest(".bloco").remove();
    atualizarContador();
    agendarSalvamento();
  };

  function atualizarContador() {
    const n = document.getElementById("blocos-container")?.querySelectorAll(".bloco").length || 0;
    document.getElementById("contador").textContent = n;
  }

  // expor para uso inline no HTML
  window.autoResizeExt = autoResize;
  window.agendarSalv = agendarSalvamento;
</script>
</body>
</html>
