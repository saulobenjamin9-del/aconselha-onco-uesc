<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aconselha Onco UESC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #DDD5CF; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; background: #DDD5CF; padding: 2rem;
  }
  .logo-row {
    display: flex; align-items: center; justify-content: center;
    gap: 2rem; margin-bottom: 1.5rem;
  }
  .logo-row img { height: 100px; object-fit: contain; }
  .welcome-text { font-size: 1.1rem; color: #444; margin-bottom: 1.5rem; text-align: center; }
  .login-box {
    background: rgba(255,255,255,0.55); border: 0.5px solid #c9c2bc;
    border-radius: 12px; padding: 1.75rem 2rem; width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .login-box label { font-size: 13px; color: #666; margin-bottom: 2px; display: block; }
  .login-box input {
    width: 100%; padding: 9px 11px; border: 0.5px solid #c9c2bc;
    border-radius: 8px; background: #f9f7f5; font-size: 14px; color: #333;
  }
  .login-btn {
    padding: 10px; border: 0.5px solid #b0a9a3; border-radius: 8px;
    background: #c9c2bc; color: #444; font-size: 14px; cursor: pointer; margin-top: 4px;
  }
  .login-btn:hover { background: #bfb8b2; }
  .login-error { color: #a33; font-size: 13px; text-align: center; display: none; }
  .login-loading { color: #777; font-size: 13px; text-align: center; display: none; }

  /* MAIN */
  #main-screen { display: none; flex-direction: column; min-height: 100vh; background: #DDD5CF; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: #cec7c1; border-bottom: 0.5px solid #b5aeaa;
    position: sticky; top: 0; z-index: 10;
  }
  .pessoas-badge {
    font-size: 13px; color: #555; background: #ddd5cf;
    border: 0.5px solid #b5aeaa; border-radius: 8px; padding: 5px 14px;
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .topbar-right img { height: 38px; object-fit: contain; }
  .logout-btn {
    font-size: 12px; color: #777; background: none;
    border: 0.5px solid #b5aeaa; border-radius: 6px; padding: 5px 12px; cursor: pointer;
  }
  .logout-btn:hover { background: #c9c2bc; }

  .content { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  /* BLOCOS */
  .bloco {
    background: rgba(255,255,255,0.5); border: 0.5px solid #c0b9b3;
    border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
  }
  .bloco-grid {
    display: grid;
    grid-template-columns: 1.2fr 0.5fr 1fr 1fr 1.5fr 2.5fr;
    gap: 10px; align-items: start;
  }
  .bloco-col { display: flex; flex-direction: column; gap: 4px; }
  .bloco-col label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .bloco-col input {
    width: 100%; padding: 7px 9px; border: 0.5px solid #c0b9b3;
    border-radius: 6px; background: #f5f2ef; font-size: 13px; color: #333;
    font-family: inherit;
  }
  .bloco-col textarea {
    width: 100%; padding: 7px 9px; border: 0.5px solid #c0b9b3;
    border-radius: 6px; background: #f5f2ef; font-size: 13px; color: #333;
    font-family: inherit; resize: none; overflow: hidden; min-height: 36px; line-height: 1.5;
  }
  .bloco-actions { display: flex; justify-content: flex-end; }
  .btn-remover {
    font-size: 12px; color: #888; background: none;
    border: 0.5px solid #b5aeaa; border-radius: 6px; padding: 5px 12px; cursor: pointer;
  }
  .btn-remover:hover { background: #d0c9c3; color: #555; }

  .add-row { padding: 4px 20px 24px; }
  .btn-add {
    font-size: 13px; color: #555; background: #cec7c1;
    border: 0.5px solid #b5aeaa; border-radius: 8px; padding: 9px 20px; cursor: pointer;
  }
  .btn-add:hover { background: #c1bab4; }

  .sync-status {
    font-size: 11px; color: #999; text-align: right;
    padding: 0 20px 8px; font-style: italic;
  }

  @media (max-width: 900px) {
    .bloco-grid { grid-template-columns: 1.2fr 0.5fr 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .bloco-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 400px) {
    .bloco-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen">
  <div class="logo-row">
    <img src="brasao-uesc.png" alt="Brasão UESC" onerror="this.style.display='none'">
    <img src="logo-aconselha.png" alt="Aconselha Onco UESC" onerror="this.style.display='none'">
  </div>
  <p class="welcome-text">Olá, seja bem-vindo ao site Aconselha Onco UESC</p>
  <div class="login-box">
    <div>
      <label>Login</label>
      <input type="email" id="inp-email" placeholder="usuario@gmail.com" autocomplete="username">
    </div>
    <div>
      <label>Senha</label>
      <input type="password" id="inp-senha" placeholder="Insira a senha" autocomplete="current-password">
    </div>
    <p class="login-error" id="login-error">Login ou senha incorretos.</p>
    <p class="login-loading" id="login-loading">Carregando...</p>
    <button class="login-btn" onclick="tentarLogin()">Entrar</button>
  </div>
</div>

<!-- TELA PRINCIPAL -->
<div id="main-screen">
  <div class="topbar">
    <div class="pessoas-badge">Pessoas atendidas: <strong id="contador">0</strong></div>
    <div class="topbar-right">
      <img src="brasao-uesc.png" alt="Brasão UESC" onerror="this.style.display='none'">
      <img src="logo-aconselha.png" alt="Aconselha Onco UESC" onerror="this.style.display='none'">
      <button class="logout-btn" onclick="sair()">Sair</button>
    </div>
  </div>
  <div class="sync-status" id="sync-status">Sincronizando...</div>
  <div class="content" id="blocos-container"></div>
  <div class="add-row">
    <button class="btn-add" onclick="adicionarBloco()">+ Adicionar mais</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
    getFirestore, collection, doc, getDocs, setDoc, deleteDoc, onSnapshot, query, orderBy
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBkYGQ-_R3gWNveNyI-1wQopVGKs1mQxco",
    authDomain: "aconselha-onco-uesc.firebaseapp.com",
    projectId: "aconselha-onco-uesc",
    storageBucket: "aconselha-onco-uesc.firebasestorage.app",
    messagingSenderId: "802283445243",
    appId: "1:802283445243:web:709fc1f2f2e5820cfa495e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const COLECAO = "blocos";

  const EMAIL_OK = "aconselhaoncouesc@gmail.com";
  const SENHA_OK = "Paliativo";

  let unsubscribe = null;
  let salvandoLocal = false; // flag para evitar loop ao receber do Firestore

  // ── UTILITÁRIOS ────────────────────────────────────────────────
  function esc(s) {
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  }

  function mascararTelefone(el) {
    let v = el.value.replace(/\D/g, "");
    if (v.length === 0) { el.value = ""; return; }
    if (v.length <= 2) { el.value = "(" + v; return; }
    if (v.length <= 6) { el.value = "(" + v.slice(0,2) + ") " + v.slice(2); return; }
    if (v.length <= 10) { el.value = "(" + v.slice(0,2) + ") " + v.slice(2,6) + "-" + v.slice(6); return; }
    el.value = "(" + v.slice(0,2) + ") " + v.slice(2,7) + "-" + v.slice(7,11);
  }

  window.mascararTelefone = mascararTelefone;

  function setSyncStatus(msg) {
    document.getElementById("sync-status").textContent = msg;
  }

  // ── LOGIN ──────────────────────────────────────────────────────
  window.tentarLogin = function() {
    const e = document.getElementById("inp-email").value.trim();
    const s = document.getElementById("inp-senha").value;
    const err = document.getElementById("login-error");
    const loading = document.getElementById("login-loading");

    if (e === EMAIL_OK && s === SENHA_OK) {
      err.style.display = "none";
      loading.style.display = "block";
      document.getElementById("login-screen").style.display = "none";
      loading.style.display = "none";
      document.getElementById("main-screen").style.display = "flex";
      iniciarEscuta();
    } else {
      err.style.display = "block";
    }
  };

  window.sair = function() {
    if (unsubscribe) unsubscribe();
    document.getElementById("main-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("inp-senha").value = "";
    document.getElementById("blocos-container").innerHTML = "";
  };

  document.getElementById("inp-senha").addEventListener("keydown", e => {
    if (e.key === "Enter") window.tentarLogin();
  });

  // ── FIRESTORE: ESCUTA EM TEMPO REAL ───────────────────────────
  function iniciarEscuta() {
    setSyncStatus("Conectando...");
    const q = query(collection(db, COLECAO), orderBy("ordem"));
    unsubscribe = onSnapshot(q, (snapshot) => {
      if (salvandoLocal) return; // evita rerender durante digitação
      const container = document.getElementById("blocos-container");
      container.innerHTML = "";
      const docs = [];
      snapshot.forEach(d => docs.push({ id: d.id, ...d.data() }));
      if (docs.length === 0) {
        adicionarBlocoComDados({ id: gerarId(), nome:"", telefone:"", data:"", obs:"", ordem: 0 }, false);
      } else {
        docs.forEach(d => adicionarBlocoComDados(d, false));
      }
      atualizarContador();
      document.querySelectorAll("textarea").forEach(autoResize);
      setSyncStatus("✓ Sincronizado");
    }, (err) => {
      setSyncStatus("Erro de conexão — verifique a internet");
      console.error(err);
    });
  }

  // ── FIRESTORE: SALVAR ──────────────────────────────────────────
  let saveTimer = null;
  function agendarSalvamento() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(salvarTodos, 1000);
  }

  async function salvarTodos() {
    salvandoLocal = true;
    setSyncStatus("Salvando...");
    const cards = document.querySelectorAll("#blocos-container .bloco");
    let ordem = 0;
    for (const card of cards) {
      const id = card.dataset.id;
      const tas = card.querySelectorAll("textarea");
      const inp = card.querySelector("input[data-campo='telefone']");
      const inpIdade = card.querySelector("input[data-campo='idade']");
      const inpData = card.querySelector("input[data-campo='data']");
      await setDoc(doc(db, COLECAO, id), {
        nome: tas[0]?.value || "",
        idade: inpIdade?.value || "",
        telefone: inp?.value || "",
        data: inpData?.value || "",
        tratamento: tas[1]?.value || "",
        obs: tas[2]?.value || "",
        ordem: ordem++
      });
    }
    // remover docs que não existem mais na tela
    const snapshot = await getDocs(collection(db, COLECAO));
    const idsNaTela = [...cards].map(c => c.dataset.id);
    for (const d of snapshot.docs) {
      if (!idsNaTela.includes(d.id)) await deleteDoc(doc(db, COLECAO, d.id));
    }
    setSyncStatus("✓ Salvo");
    salvandoLocal = false;
  }

  // ── BLOCOS ─────────────────────────────────────────────────────
  function gerarId() {
    return "b" + Date.now() + Math.random().toString(36).slice(2,6);
  }

  window.adicionarBloco = function() {
    const container = document.getElementById("blocos-container");
    const ordem = container.querySelectorAll(".bloco").length;
    const d = { id: gerarId(), nome:"", telefone:"", data:"", obs:"", ordem };
    adicionarBlocoComDados(d, true);
    agendarSalvamento();
  };

  function adicionarBlocoComDados(d, focarNome = false) {
    const container = document.getElementById("blocos-container");
    const div = document.createElement("div");
    div.className = "bloco";
    div.dataset.id = d.id;
    div.innerHTML = `
      <div class="bloco-grid">
        <div class="bloco-col">
          <label>Nome</label>
          <textarea data-campo="nome" placeholder="Nome completo" oninput="autoResizeExt(this);agendarSalv()">${esc(d.nome)}</textarea>
        </div>
        <div class="bloco-col">
          <label>Idade (em anos)</label>
          <input type="number" data-campo="idade" placeholder="Ex: 45" min="0" max="120" value="${esc(d.idade||'')}" oninput="agendarSalv()">
        </div>
        <div class="bloco-col">
          <label>Telefone</label>
          <input type="tel" data-campo="telefone" placeholder="(00) 00000-0000" value="${esc(d.telefone)}" oninput="mascararTelefone(this);agendarSalv()">
        </div>
        <div class="bloco-col">
          <label>Data</label>
          <input type="text" data-campo="data" placeholder="Ex: 10/06 – retorno" value="${esc(d.data)}" oninput="agendarSalv()">
        </div>
        <div class="bloco-col">
          <label>Tratamento atual</label>
          <textarea data-campo="tratamento" placeholder="Protocolo de tratamento..." oninput="autoResizeExt(this);agendarSalv()">${esc(d.tratamento||'')}</textarea>
        </div>
        <div class="bloco-col">
          <label>Observações</label>
          <textarea data-campo="obs" placeholder="Anotações do atendimento..." oninput="autoResizeExt(this);agendarSalv()">${esc(d.obs)}</textarea>
        </div>
      </div>
      <div class="bloco-actions">
        <button class="btn-remover" onclick="removerBloco(this)">Remover este bloco</button>
      </div>`;
    container.appendChild(div);
    atualizarContador();
    if (focarNome) div.querySelector("textarea").focus();
  }

  window.removerBloco = function(btn) {
    const container = document.getElementById("blocos-container");
    if (container.querySelectorAll(".bloco").length <= 1) return;
    btn.closest(".bloco").remove();
    atualizarContador();
    agendarSalvamento();
  };

  function atualizarContador() {
    const n = document.getElementById("blocos-container")?.querySelectorAll(".bloco").length || 0;
    document.getElementById("contador").textContent = n;
  }

  // expor para uso inline no HTML
  window.autoResizeExt = autoResize;
  window.agendarSalv = agendarSalvamento;
</script>
</body>
</html>
